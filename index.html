<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trucker Wallet Pro — Build 2</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
</head>

<body data-theme="dark">

<header class="header">
  <div class="header-top">
    <div class="brand">TW PRO</div>
  </div>

  <div class="page-title">Logbook</div>

  <div class="segmented">
    <button class="active">KM</button>
    <button>MI</button>
  </div>
</header>

<main class="main">

  <div class="card">
    <div class="summary-label">This Week</div>
    <div class="summary-amount">\$0.00 CAD</div>
  </div>

</main>

<button class="fab">+</button>

<nav class="tabbar">
  <div class="tab active" data-tab="log">Log</div>
  <div class="tab" data-tab="archive">Archive</div>
  <div class="tab" data-tab="data">Data</div>
  <div class="tab" data-tab="settings">Settings</div>
</nav>

<script src="js/app.js"></script>
</body>
</html>
