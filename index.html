<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trucker Wallet Pro — Build 2</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
</head>

<body data-theme="dark">

<!-- ===============================
     ADD / EDIT ENTRY MODAL
================================= -->

<div class="modal" hidden>
  <div class="modal-backdrop"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="entry-modal-title">New Entry</div>
      <button class="modal-close" type="button">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="entry-date">
      </div>

      <div class="form-group">
        <label>Distance (KM)</label>
        <input type="number" id="entry-distance" placeholder="Enter km">
      </div>

      <div class="form-group">
        <label>Pick-ups</label>
        <input type="number" id="entry-pickups" placeholder="0">
      </div>

      <div class="form-group">
        <label>Waiting Hours</label>
        <input type="number" id="entry-waiting" placeholder="0" step="0.1" min="0">
      </div>

      <button class="primary-btn" id="save-entry" type="button">
        Save Entry
      </button>
    </div>
  </div>
</div>

<!-- ===============================
     CUSTOMER MODAL
================================= -->

<div class="modal" id="customer-modal" hidden>
  <div class="modal-backdrop" data-action="close-customer-modal"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="customer-modal-title">
        Add Customer
      </div>
      <button class="modal-close"
              type="button"
              data-action="close-customer-modal">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Name</label>
        <input id="customer-name" type="text" placeholder="Customer name">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input id="customer-address" type="text" placeholder="Address">
      </div>

      <div class="form-group switch-row">
        <input type="checkbox" id="customer-24h" />
        <label for="customer-24h">Open 24 Hours</label>
      </div>

      <div id="customer-hours">
        <div class="form-group">
          <label>Open</label>
          <input id="customer-open" type="time" />
        </div>

        <div class="form-group">
          <label>Close</label>
          <input id="customer-close" type="time" />
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="customer-notes" placeholder="Notes"></textarea>
      </div>

      <button class="primary-btn full-width"
              data-action="save-customer"
              type="button">
        Save Customer
      </button>

    </div>
  </div>
</div>

<!-- ===============================
     TRAILER MODAL
================================= -->

<div class="modal" id="trailer-modal" hidden>
  <div class="modal-backdrop" data-action="close-trailer-modal"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="trailer-modal-title">
        Add Trailer
      </div>
      <button class="modal-close"
              type="button"
              data-action="close-trailer-modal">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Unit Number</label>
        <input id="trailer-unit-number" type="text" placeholder="e.g. 4021">
      </div>

      <div class="form-group">
        <label>Plate</label>
        <input id="trailer-plate" type="text" placeholder="e.g. AB12345">
      </div>

      <div class="form-group">
        <label>Max Load</label>
        <input id="trailer-max-load" type="number" min="0" placeholder="e.g. 45000">
      </div>

      <div class="form-group">
        <label>PSI</label>
        <input id="trailer-psi" type="number" min="0" placeholder="e.g. 110">
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="trailer-notes" placeholder="Notes"></textarea>
      </div>

      <div id="trailer-modal-error" class="form-error"></div>

      <button class="primary-btn full-width"
              data-action="save-trailer"
              type="button">
        Save Trailer
      </button>

    </div>
  </div>
</div>

<!-- ===============================
     ARCHIVE ENTRY MODAL
================================= -->

<div class="modal" id="archive-entry-modal" hidden>
  <div class="modal-backdrop" data-action="close-archive-entry-modal"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">Edit Archived Entry</div>
      <button class="modal-close"
              type="button"
              data-action="close-archive-entry-modal">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="archive-entry-date">
      </div>

      <div class="form-group">
        <label>Distance (KM)</label>
        <input type="number" id="archive-entry-distance" min="0" step="0.1">
      </div>

      <div class="form-group">
        <label>Pick-ups</label>
        <input type="number" id="archive-entry-pickups" min="0" step="1">
      </div>

      <div class="form-group">
        <label>Waiting Hours</label>
        <input type="number" id="archive-entry-waiting" min="0" step="0.1">
      </div>

      <div class="form-group">
        <label>Rate per Mile</label>
        <input type="number" id="archive-entry-rate-mile" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Rate per Drop</label>
        <input type="number" id="archive-entry-rate-drop" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Rate per Waiting Hour</label>
        <input type="number" id="archive-entry-rate-waiting" min="0" step="0.01">
      </div>

      <div id="archive-entry-modal-error" class="form-error"></div>

      <button class="primary-btn full-width"
              data-action="save-archive-entry"
              type="button">
        Save Changes
      </button>

    </div>
  </div>
</div>

<!-- ===============================
     HEADER
================================= -->

<header class="header">
  <div class="header-top">
    <div class="brand">TW PRO</div>
    <button
      class="export-header-btn"
      id="export-btn"
      data-action="export-archive"
      style="display:none"
      type="button">
      📤
    </button>
  </div>

  <div class="page-title">Logbook</div>

  <div class="segmented" id="unit-toggle">
    <button data-unit="km" class="active" type="button">KM</button>
    <button data-unit="mi" type="button">MI</button>
  </div>
</header>

<!-- ===============================
     MAIN
================================= -->

<main class="main">

  <section class="page" data-page="log">
    <div class="card">
      <div class="summary-label">Total</div>
      <div class="summary-amount">\$0.00 CAD</div>
    </div>

    <button id="finish-week-btn" class="primary-btn" type="button">
      Finish Week
    </button>

    <div class="logbook-list"></div>
  </section>

  <section class="page" data-page="archive" hidden></section>

  <section class="page" data-page="data" hidden></section>

  <section class="page" data-page="settings" hidden></section>

</main>

<button class="fab" type="button">+</button>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tab active" data-tab="log" type="button">Log</button>
    <button class="tab" data-tab="archive" type="button">Archive</button>
    <button class="tab" data-tab="data" type="button">Data</button>
    <button class="tab" data-tab="settings" type="button">Settings</button>
  </div>
</nav>

<script type="module" src="js/app.js"></script>

</body>
</html>
