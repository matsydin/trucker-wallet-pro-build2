<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trucker Wallet Pro — Build 2</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
</head>

<body data-theme="dark">

<!-- ===============================
     ADD ENTRY MODAL
================================= -->

<div class="modal" hidden>
  <div class="modal-backdrop"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">New Entry</div>
      <button class="modal-close" type="button">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="entry-date">
      </div>

      <div class="form-group">
        <label>Distance (KM)</label>
        <input type="number" id="entry-distance" placeholder="Enter km">
      </div>

      <div class="form-group">
        <label>Pick-ups</label>
        <input type="number" id="entry-pickups" placeholder="0">
      </div>

      <button class="primary-btn" id="save-entry" type="button">
        Save Entry
      </button>
    </div>
  </div>
</div>

<!-- ===============================
     CUSTOMER MODAL
================================= -->

<div class="modal" id="customer-modal" hidden>
  <div class="modal-backdrop" data-action="close-customer-modal"></div>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="customer-modal-title">
        Add Customer
      </div>
      <button class="modal-close"
              type="button"
              data-action="close-customer-modal">✕</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label>Name</label>
        <input id="customer-name" type="text" placeholder="Customer name">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input id="customer-address" type="text" placeholder="Address">
      </div>

      <div class="form-group switch-row">
        <input type="checkbox" id="customer-24h" />
        <label for="customer-24h">Open 24 Hours</label>
      </div>

      <div id="customer-hours">
        <div class="form-group">
          <label>Open</label>
          <input id="customer-open" type="time" />
        </div>

        <div class="form-group">
          <label>Close</label>
          <input id="customer-close" type="time" />
        </div>
      </div>

      <button class="primary-btn full-width"
              id="save-customer"
              type="button">
        Save Customer
      </button>

    </div>
  </div>
</div>

<!-- ===============================
     HEADER
================================= -->

<header class="header">
  <div class="header-top">
    <div class="brand">TW PRO</div>
  </div>

  <div class="page-title">Logbook</div>

  <div class="segmented">
    <button data-unit="km" class="active" type="button">KM</button>
    <button data-unit="mi" type="button">MI</button>
  </div>
</header>

<!-- ===============================
     MAIN
================================= -->

<main class="main">

  <!-- LOG -->
  <section class="page" data-page="log">
    <div class="card">
      <div class="summary-label">Total</div>
      <div class="summary-amount">\$0.00 CAD</div>
    </div>

    <button id="finish-week-btn" class="primary-btn" type="button">
      Finish Week
    </button>

    <div class="logbook-list"></div>
  </section>

  <!-- ARCHIVE -->
  <section class="page" data-page="archive" hidden></section>

  <!-- DATA -->
  <section class="page" data-page="data" hidden></section>

  <!-- SETTINGS -->
  <section class="page" data-page="settings" hidden></section>

</main>

<button class="fab" type="button">+</button>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tab active" data-tab="log" type="button">Log</button>
    <button class="tab" data-tab="archive" type="button">Archive</button>
    <button class="tab" data-tab="data" type="button">Data</button>
    <button class="tab" data-tab="settings" type="button">Settings</button>
  </div>
</nav>

<script type="module" src="js/app.js"></script>

</body>
</html>
