<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trucker Wallet Pro — Build 2</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
</head>

<body data-theme="dark">

<header class="header">
  <div class="header-top">
    <div class="brand">TW PRO</div>
  </div>

  <div class="page-title">Logbook</div>

  <div class="segmented">
  <button data-unit="km" class="active">KM</button>
  <button data-unit="mi">MI</button>
  </div>
</header>

<main class="main">

  <!-- LOG -->
  <section class="page" data-page="log">

  <div class="card">
    <div class="summary-label">Total</div>
    <div class="summary-amount">\$0.00 CAD</div>
  </div>

  <div class="logbook-list"></div>

</section>

  <!-- ARCHIVE -->
  <section class="page" data-page="archive" hidden>
    <div class="card">
      <div class="summary-label">Archive screen</div>
    </div>
  </section>

  <!-- DATA -->
  <section class="page" data-page="data" hidden>
    <div class="card">
      <div class="summary-label">Customers & Fleet</div>
    </div>
  </section>

  <!-- SETTINGS -->
  <section class="page" data-page="settings" hidden>
    <div class="card">
      <div class="summary-label">Settings screen</div>
    </div>
  </section>

</main>

<button class="fab">+</button>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tab active" data-tab="log" type="button">Log</button>
    <button class="tab" data-tab="archive" type="button">Archive</button>
    <button class="tab" data-tab="data" type="button">Data</button>
    <button class="tab" data-tab="settings" type="button">Settings</button>
  </div>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
